<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization Accessibility Study</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* CSS to ensure everything fits in a single viewport without scrolling */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            overflow: hidden; /* Prevents scrolling */
        }
        #experiment-container {
            width: 800px;
            max-width: 95vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #task-instructions {
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-align: center;
        }
        #viz-container {
            width: 500px;
            height: 350px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }
        /* Normal vs Obscured Conditions */
        .obscured-vision {
            filter: blur(2px) brightness(0.8) contrast(0.7); 
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .response-buttons button {
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 1rem;
            cursor: pointer;
        }
        .likert-container {
            margin-top: 20px;
            text-align: center;
            display: none; /* Hidden until answer is selected */
        }
        .likert-scale {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="experiment-container">
        <div id="task-instructions">
            <strong>Task:</strong> Which category has the highest value?
        </div>

        <div id="viz-container"></div>

        <div class="controls">
            <div class="response-buttons" id="answers">
                <button onclick="selectAnswer('A')">A</button>
                <button onclick="selectAnswer('B')">B</button>
                <button onclick="selectAnswer('C')">C</button>
                <button onclick="selectAnswer('D')">D</button>
            </div>

            <div class="likert-container" id="likert">
                <p>How difficult was this task?</p>
                <div class="likert-scale">
                    <label><input type="radio" name="difficulty" value="1"> 1 (Very Easy)</label>
                    <label><input type="radio" name="difficulty" value="2"> 2</label>
                    <label><input type="radio" name="difficulty" value="3"> 3</label>
                    <label><input type="radio" name="difficulty" value="4"> 4</label>
                    <label><input type="radio" name="difficulty" value="5"> 5 (Very Hard)</label>
                </div>
                <button style="margin-top: 15px;" onclick="submitTrial()">Submit & Next Trial</button>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let stimulusOnset;
        let selectedAnswer = null;
        let correctAnswer = 'C'; // Example correct answer
        let trialData = {};

        // Mock data for a "Position x Color" dot graph condition
        const data = [
            { category: 'A', value: 30 },
            { category: 'B', value: 50 },
            { category: 'C', value: 90 },
            { category: 'D', value: 20 }
        ];

        function renderVisualization() {
            // Clear previous
            d3.select("#viz-container").selectAll("*").remove();

            const margin = {top: 20, right: 20, bottom: 40, left: 40};
            const width = 500 - margin.left - margin.right;
            const height = 350 - margin.top - margin.bottom;

            const svg = d3.select("#viz-container")
                .append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            // Scales
            const x = d3.scaleBand().domain(data.map(d => d.category)).range([0, width]).padding(1);
            const y = d3.scaleLinear().domain([0, 100]).range([height, 0]);
            
            // Color encoding (Redundant to position)
            const color = d3.scaleSequential(d3.interpolateBlues).domain([0, 100]);

            // Axes
            svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x));
            svg.append("g").call(d3.axisLeft(y));

            // Dots (Position x Color encoding)
            svg.selectAll(".dot")
                .data(data)
                .enter()
                .append("circle")
                .attr("cx", d => x(d.category))
                .attr("cy", d => y(d.value))
                .attr("r", 8)
                .style("fill", d => color(d.value));

            // Optional: Toggle this class based on experimental condition
            // document.getElementById("viz-container").classList.add("obscured-vision");

            // START TIMER
            stimulusOnset = performance.now();
        }

        function selectAnswer(answer) {
            selectedAnswer = answer;
            let completionTime = performance.now();
            
            // Calculate speed in seconds
            trialData.speedInSeconds = (completionTime - stimulusOnset) / 1000;
            trialData.isCorrect = (selectedAnswer === correctAnswer);
            
            // Hide answers, show Likert scale
            document.getElementById("answers").style.display = "none";
            document.getElementById("likert").style.display = "block";
        }

        function submitTrial() {
            const difficultyInput = document.querySelector('input[name="difficulty"]:checked');
            if (!difficultyInput) {
                alert("Please rate the task difficulty before proceeding.");
                return;
            }

            trialData.perceivedDifficulty = parseInt(difficultyInput.value);
            
            // Log the JSON data payload for this trial
            console.log("Trial Complete Data JSON:", JSON.stringify(trialData));

            // Reset for next trial
            document.getElementById("likert").style.display = "none";
            document.getElementById("answers").style.display = "block";
            
            // Uncheck radios
            document.querySelectorAll('input[name="difficulty"]').forEach(r => r.checked = false);

            // In a real app, you would append `trialData` to an array and render the next trial here
            alert(`Trial logged! Speed: ${trialData.speedInSeconds.toFixed(2)}s | Correct: ${trialData.isCorrect} | Difficulty: ${trialData.perceivedDifficulty}`);
        }

        // Initialize first trial on load
        window.onload = renderVisualization;
    </script>
</body>
</html>
